<html>
  <head>
    <title>container + WASI on browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.17.0/css/xterm.css">
  </head>
  <body>
    <div id="terminal"></div>
    <script src="./dist/runcontainer.js"></script>
    <script type="module">
      import 'https://unpkg.com/xterm@5.3.0/lib/xterm.js';
      import 'https://unpkg.com/xterm-pty/index.js';

      const xterm = new Terminal();
      xterm.open(document.getElementById("terminal"));

      const { master, slave } = openpty();

      xterm.loadAddon(master);

      let Module = {};
      Module.pty = slave;
      var readableCallbacks = [];
      Module.pty.onReadable(() => {
          readableCallbacks.forEach(cb => cb());
          readableCallbacks = [];
      });
      Module['preRun'] = [];
      Module['preRun'].push((Module) => {
          Module['TTY'].stream_ops.poll = (stream, timeout, notifyCallback) => {
              if (Module.pty.readable) {
                  return 1;
              }
              if (notifyCallback != null) {
                  notifyCallback.registerCleanupFunc(() => {
                      const i = readableCallbacks.indexOf(notifyCallback);
                      if (i != -1) readableCallbacks.splice(i, 1);
                  });
                  readableCallbacks.push(notifyCallback);
              }
              return 0;
          };
      });

      const vmImage = location.origin + "/img";
      const outJsAddr = vmImage + "/out.js";
      const argModuleJsAddr = vmImage + "/arg-module.js";
      const loadJsAddr = vmImage + "/load.js";
      const mounterImage = location.origin + "/imagemounter.wasm.gzip";
      const stackWorkerFile = location.origin + "/dist/stack-worker.js";
      const containerImageAddress = getImageParam();
      Module = await RunContainer.createContainerQEMUWasm(Module, outJsAddr, containerImageAddress, stackWorkerFile, mounterImage, argModuleJsAddr, loadJsAddr, (p) => vmImage + "/" + p);
      function getImageParam() {
          var vars = location.search.substring(1).split('&');
          for (var i = 0; i < vars.length; i++) {
              var kv = vars[i].split('=');
              if (decodeURIComponent(kv[0]) == 'image') {
                  return kv[1];
              }
          }
          return null;
      }
    </script>
  </body>
</html>
